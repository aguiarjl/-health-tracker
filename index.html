<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Health Tracker v25</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; background: #0f0f0f; font-family: 'Inter', -apple-system, sans-serif; color: #e8e8e8; padding: 24px 16px; }
input { background: #1a1a1a; border: 1px solid #2a2a2a; color: #e8e8e8; border-radius: 6px; padding: 10px 12px; font-family: 'Inter', -apple-system, sans-serif; font-size: 13px; width: 100%; outline: none; }
input:focus { border-color: #8a8a8a; }
input::placeholder { color: #777777; }
button { cursor: pointer; font-family: 'Inter', -apple-system, sans-serif; border: none; border-radius: 6px; }
.card { background: #161616; border-radius: 12px; border: 1px solid #222; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fadein { animation: fadeIn 0.3s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.shake { animation: shake 0.4s ease; }
#serving-modal {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 1002; align-items: center; justify-content: center; padding: 24px;
}
#serving-modal.active { display: flex; }
#autocomplete-list .ac-item { padding:10px 12px; border-bottom:1px solid #262626; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:8px; }
#autocomplete-list .ac-item:last-child { border-bottom:none; }
#autocomplete-list .ac-item:active { background:#252525; }
#autocomplete-list .ac-name { font-size:12px; color:#ddd; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#autocomplete-list .ac-macro { font-size:10px; color:#999999; white-space:nowrap; }
#autocomplete-list .ac-src { font-size:8px; letter-spacing:1px; padding:1px 4px; border-radius:3px; }
#db-dot { position:fixed; bottom:10px; right:10px; width:10px; height:10px; border-radius:50%; background:#1e1e1e; border:1px solid #2a2a2a; z-index:30; cursor:pointer; opacity:0.4; }
#db-modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); z-index:1003; padding:24px; overflow-y:auto; }
#db-modal.active { display:block; }
</style>
</head>
<body>
<div style="max-width:480px;margin:0 auto">

  <div style="margin-bottom:20px">
    <div style="font-family:'Inter',sans-serif;font-weight:800;font-size:34px;letter-spacing:-1px;color:#fff;line-height:1">HEALTH TRACKER</div>
    <div style="color:#8a8a8a;font-size:11px;margin-top:4px;letter-spacing:2px">211 LBS TO 180 LBS · 0.5 LB/WEEK</div>
  </div>

  <div style="display:flex;gap:4px;margin-bottom:20px;background:#161616;border-radius:8px;padding:4px;border:1px solid #222">
    <button id="tab-today" onclick="switchTab('today')" style="flex:1;padding:8px;font-size:11px;letter-spacing:2px;background:#2a2a2a;color:#e8e8e8;border-radius:6px">TODAY</button>
    <button id="tab-history" onclick="switchTab('history')" style="flex:1;padding:8px;font-size:11px;letter-spacing:2px;background:none;color:#8a8a8a;border-radius:6px">HISTORY</button>
  </div>

  <div id="view-today">

    <div id="stats-wrap" style="margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="card" style="padding:16px">
        <div style="font-size:10px;letter-spacing:2px;color:#8a8a8a;margin-bottom:10px">CALORIES</div>
        <div style="background:#0f0f0f;border-radius:6px;height:6px;margin-bottom:10px;overflow:hidden">
          <div id="cal-bar" style="height:100%;width:0%;background:#22c55e;border-radius:6px"></div>
        </div>
        <div id="cal-used" style="font-size:18px;font-family:'Inter',sans-serif;font-weight:800;color:#22c55e;letter-spacing:1px;line-height:1">0<span style="font-size:10px;color:#777777;margin-left:2px">used</span></div>
        <div id="cal-left" style="font-size:14px;font-family:'Inter',sans-serif;font-weight:800;color:#8a8a8a;letter-spacing:1px;margin-top:4px">2050<span style="font-size:9px;color:#777777;margin-left:2px">left</span></div>
        <div id="cal-goal-label" style="font-size:9px;color:#5a5a5a;margin-top:4px">goal 2050</div>
      </div>
      <div class="card" style="padding:16px">
        <div style="font-size:10px;letter-spacing:2px;color:#8a8a8a;margin-bottom:10px">PROTEIN</div>
        <div style="background:#0f0f0f;border-radius:6px;height:6px;margin-bottom:10px;overflow:hidden">
          <div id="prot-bar" style="height:100%;width:0%;background:#60a5fa;border-radius:6px"></div>
        </div>
        <div id="prot-used" style="font-size:18px;font-family:'Inter',sans-serif;font-weight:800;color:#60a5fa;letter-spacing:1px;line-height:1">0<span style="font-size:10px;color:#777777;margin-left:2px">g used</span></div>
        <div id="prot-left" style="font-size:14px;font-family:'Inter',sans-serif;font-weight:800;color:#8a8a8a;letter-spacing:1px;margin-top:4px">115<span style="font-size:9px;color:#777777;margin-left:2px">g left</span></div>
        <div style="font-size:9px;color:#5a5a5a;margin-top:4px">goal 115g</div>
      </div>
    </div>

    <div class="card" style="padding:16px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:10px;letter-spacing:2px;color:#8a8a8a">WORKOUT BONUS</div>
        <div id="bonus-badge" style="display:none;font-size:10px;color:#22c55e;letter-spacing:1px"></div>
      </div>
      <div id="workout-quick" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"></div>
      <div style="display:grid;grid-template-columns:1fr 100px;gap:8px">
        <input id="inp-wname" placeholder="Custom workout"/>
        <input id="inp-wcal" placeholder="Cal" type="number"/>
      </div>
      <button onclick="addWorkoutCustom()" style="margin-top:8px;width:100%;background:#1a2e1a;color:#22c55e;padding:9px;font-size:11px;letter-spacing:1px;border:1px solid #2a4a2a">+ LOG WORKOUT</button>
      <div id="workout-log"></div>
    </div>

    <div id="favorites-wrap" style="margin-bottom:16px;display:none">
      <div style="font-size:10px;letter-spacing:2px;color:#8a8a8a;margin-bottom:8px">FAVORITES</div>
      <div id="favorites-list" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>

    <div id="frequent-wrap" style="margin-bottom:16px;display:none">
      <div style="font-size:10px;letter-spacing:2px;color:#8a8a8a;margin-bottom:8px">FREQUENT FOODS</div>
      <div id="quick-add" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>

    <div class="card" style="padding:16px;margin-bottom:20px">
      <div style="font-size:10px;letter-spacing:2px;color:#8a8a8a;margin-bottom:12px">MANUAL ENTRY</div>
      <div style="display:grid;gap:8px">
        <div style="position:relative">
          <input id="inp-name" placeholder="Food name" autocomplete="off" oninput="onFoodNameInput()" onfocus="onFoodNameInput()"/>
          <div id="autocomplete-list" style="display:none;position:absolute;top:100%;left:0;right:0;background:#1a1a1a;border:1px solid #5a5a5a;border-top:none;border-radius:0 0 8px 8px;max-height:260px;overflow-y:auto;z-index:50"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <input id="inp-cal" placeholder="Cal" type="number"/>
          <input id="inp-prot" placeholder="Protein (g)" type="number"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr auto;gap:8px">
          <button onclick="addFoodEntry()" style="background:#e8e8e8;color:#0f0f0f;padding:10px;font-size:12px;font-weight:500;letter-spacing:1px">+ ADD</button>
          <button onclick="saveToFavorites()" title="Save as favorite" style="background:#1a1a2e;color:#60a5fa;padding:10px 14px;font-size:14px;border:1px solid #2a2a4a">&#9733;</button>
        </div>
      </div>
    </div>

    <div id="food-log"></div>
    <div id="empty-msg" style="text-align:center;color:#5a5a5a;font-size:12px;padding:32px 0;letter-spacing:1px">NO ENTRIES YET</div>
  </div>

  <div id="view-history" style="display:none">
    <div id="history-content"></div>
  </div>

</div>

<script>
var BASE_GOAL = 2050;
var PROT_GOAL = 115;var WORKOUTS = [
  {name:"Basketball (1hr)", calories:700},
  {name:"Walk (40min)", calories:180}
];

function todayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function storeGet(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
function storeSet(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }
function getHistory() { try { return JSON.parse(storeGet('fuel') || '{}'); } catch(e) { return {}; } }
function saveHistory(h) { storeSet('fuel', JSON.stringify(h)); }
function getFavorites() { try { return JSON.parse(storeGet('fuel_favs') || '[]'); } catch(e) { return []; } }
function saveFavorites(f) { storeSet('fuel_favs', JSON.stringify(f)); }
function getTodayData() {
  var h = getHistory();
  var d = h[todayKey()] || {};
  return { entries: d.entries || [], workouts: d.workouts || [] };
}

var data = getTodayData();
var entries = data.entries;
var workouts = data.workouts;
var currentTab = 'today';
var expandedDay = null;
var prevDay = todayKey();

function effectiveGoal() {
  var burned = 0;
  for (var i=0; i<workouts.length; i++) burned += workouts[i].calories;
  return BASE_GOAL + burned;
}

function persist() {
  var h = getHistory();
  h[todayKey()] = { entries: entries, workouts: workouts };
  saveHistory(h);
}

function addFoodEntry() {
  var n = document.getElementById('inp-name').value.trim();
  var c = parseFloat(document.getElementById('inp-cal').value);
  var p = parseFloat(document.getElementById('inp-prot').value) || 0;
  if (!n || isNaN(c) || c <= 0) return;
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-cal').value = '';
  document.getElementById('inp-prot').value = '';
  openServingModal(n, c, p);
}

function addWorkoutCustom() {
  var n = document.getElementById('inp-wname').value.trim();
  var c = parseFloat(document.getElementById('inp-wcal').value);
  if (!n || isNaN(c) || c <= 0) return;
  addWorkout(n, c);
  document.getElementById('inp-wname').value = '';
  document.getElementById('inp-wcal').value = '';
}

function addFood(name, cal, prot) {
  entries.push({ name: name, calories: Number(cal), protein: Number(prot) || 0, id: Date.now() });
  persist();
  render();
  doShake();
}

function addWorkout(name, cal) {
  workouts.push({ name: name, calories: Number(cal), id: Date.now() });
  persist();
  render();
  doShake();
}

function removeFood(id) {
  var newArr = [];
  for (var i=0; i<entries.length; i++) { if (entries[i].id !== id) newArr.push(entries[i]); }
  entries = newArr;
  persist();
  render();
}

function removeWorkout(id) {
  var newArr = [];
  for (var i=0; i<workouts.length; i++) { if (workouts[i].id !== id) newArr.push(workouts[i]); }
  workouts = newArr;
  persist();
  render();
}

function resetToday() {
  if (!confirm('Reset today\'s log?')) return;
  entries = []; workouts = [];
  persist(); render();
}

function saveToFavorites() {
  var n = document.getElementById('inp-name').value.trim();
  var c = parseFloat(document.getElementById('inp-cal').value);
  var p = parseFloat(document.getElementById('inp-prot').value) || 0;
  if (!n || isNaN(c) || c <= 0) { alert('Enter a food name and calories first.'); return; }
  var favs = getFavorites();
  for (var i=0; i<favs.length; i++) { if (favs[i].name === n) { alert(n + ' is already in favorites.'); return; } }
  favs.push({ name: n, calories: Number(c), protein: Number(p) });
  saveFavorites(favs);
  renderFavorites();
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-cal').value = '';
  document.getElementById('inp-prot').value = '';
}

function removeFavorite(name) {
  var favs = getFavorites();
  var newFavs = [];
  for (var i=0; i<favs.length; i++) { if (favs[i].name !== name) newFavs.push(favs[i]); }
  saveFavorites(newFavs);
  renderFavorites();
}

function renderFavorites() {
  var favs = getFavorites();
  favs = favs.slice().sort(function(a,b) {
    var an = /^\d/.test(a.name); var bn = /^\d/.test(b.name);
    if (an && !bn) return -1; if (!an && bn) return 1;
    return a.name.toLowerCase() < b.name.toLowerCase() ? -1 : a.name.toLowerCase() > b.name.toLowerCase() ? 1 : 0;
  });
  var wrap = document.getElementById('favorites-wrap');
  var list = document.getElementById('favorites-list');
  if (favs.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  var html = '';
  for (var i=0; i<favs.length; i++) {
    var f = favs[i];
    var safe = f.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    html += '<div style="display:flex;align-items:center;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:6px;overflow:hidden">';
    html += '<button onclick="openServingModal(\'' + safe + '\',' + f.calories + ',' + f.protein + ')" style="background:none;color:#aaa;font-size:11px;padding:6px 10px;flex:1;text-align:left">' + f.name + ' <span style="color:#777777">' + f.calories + 'CAL</span></button>';
    html += '<button onclick="removeFavorite(\'' + safe + '\')" style="background:none;color:#777777;font-size:13px;padding:6px 10px;border-left:1px solid #2a2a4a">x</button>';
    html += '</div>';
  }
  list.innerHTML = html;
}

// ---- BARCODE SCANNER ----


// ---- END SCANNER ----

function doShake() {
  var sw = document.getElementById('stats-wrap');
  sw.classList.remove('shake');
  setTimeout(function() { sw.classList.add('shake'); }, 10);
  setTimeout(function() { sw.classList.remove('shake'); }, 450);
}

function render() {
  var goal = effectiveGoal();
  var totalCal = 0; for (var i=0; i<entries.length; i++) totalCal += entries[i].calories;
  var totalProt = 0; for (var i=0; i<entries.length; i++) totalProt += entries[i].protein;
  var bonus = goal - BASE_GOAL;
  var calLeft = goal - totalCal;
  var protLeft = PROT_GOAL - totalProt; if (protLeft < 0) protLeft = 0;
  var calPct = totalCal / goal * 100; if (calPct > 100) calPct = 100;
  var protPct = totalProt / PROT_GOAL * 100; if (protPct > 100) protPct = 100;
  var calColor = calPct > 95 ? '#ef4444' : calPct > 75 ? '#f59e0b' : '#22c55e';
  var protColor = protPct > 95 ? '#22c55e' : protPct > 60 ? '#f59e0b' : '#60a5fa';

  document.getElementById('cal-bar').style.width = calPct + '%';
  document.getElementById('cal-bar').style.background = calColor;
  document.getElementById('cal-used').style.color = calColor;
  document.getElementById('cal-used').innerHTML = totalCal + '<span style="font-size:12px;color:#777777;margin-left:2px">used</span>';
  document.getElementById('cal-left').style.color = calLeft < 0 ? '#ef4444' : '#8a8a8a';
  document.getElementById('cal-left').innerHTML = (calLeft < 0 ? 0 : calLeft) + '<span style="font-size:11px;color:#777777;margin-left:2px">left</span>';
  document.getElementById('cal-goal-label').textContent = bonus > 0 ? 'goal ' + goal + ' (+' + bonus + ' bonus)' : 'goal ' + goal;

  document.getElementById('prot-bar').style.width = protPct + '%';
  document.getElementById('prot-bar').style.background = protColor;
  document.getElementById('prot-used').style.color = protColor;
  document.getElementById('prot-used').innerHTML = totalProt + '<span style="font-size:12px;color:#777777;margin-left:2px">g used</span>';
  document.getElementById('prot-left').style.color = protLeft <= 0 ? '#22c55e' : '#8a8a8a';
  document.getElementById('prot-left').innerHTML = (protLeft <= 0 ? 0 : protLeft) + '<span style="font-size:11px;color:#777777;margin-left:2px">g left</span>';

  var badge = document.getElementById('bonus-badge');
  if (bonus > 0) { badge.style.display = 'block'; badge.textContent = '+' + bonus + ' Cal unlocked'; }
  else { badge.style.display = 'none'; }

  // Frequent foods (past 7 days, 2+ times, not in favorites)
  var h = getHistory();
  var today = todayKey();
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  var counts = {}; var foodMap = {};
  for (var k in h) {
    if (k === today) continue;
    var kDate = new Date(k + 'T12:00:00');
    if (kDate < cutoff) continue;
    var dayItems = Array.isArray(h[k]) ? h[k] : (h[k].entries || []);
    var seen = {};
    for (var fi=0; fi<dayItems.length; fi++) {
      var fn = dayItems[fi].name;
      if (!seen[fn]) { counts[fn] = (counts[fn] || 0) + 1; seen[fn] = true; }
      foodMap[fn] = dayItems[fi];
    }
  }
  var frequent = [];
  var favs = getFavorites(); var favNames = {};
  for (var fi2=0; fi2<favs.length; fi2++) favNames[favs[fi2].name.toLowerCase()] = true;
  for (var fn in counts) { if (counts[fn] >= 2 && !favNames[fn.toLowerCase()]) frequent.push(foodMap[fn]); }
  var fwrap = document.getElementById('frequent-wrap');
  var qa = document.getElementById('quick-add');
  if (frequent.length > 0) {
    fwrap.style.display = 'block';
    var qhtml = '';
    for (var fi=0; fi<frequent.length; fi++) {
      var fit = frequent[fi];
      var fsafe = fit.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      qhtml += '<button onclick="addFood(\'' + fsafe + '\',' + fit.calories + ',' + fit.protein + ')" style="background:#1a1a1a;color:#aaa;font-size:11px;padding:6px 10px;border:1px solid #2a2a2a">' + fit.name + '</button>';
    }
    qa.innerHTML = qhtml;
  } else { fwrap.style.display = 'none'; }

  // Workout log
  var wlog = document.getElementById('workout-log');
  if (workouts.length === 0) { wlog.innerHTML = ''; }
  else {
    var whtml = '';
    for (var i=0; i<workouts.length; i++) {
      var w = workouts[i];
      whtml += '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid #1a1a1a;margin-top:6px">';
      whtml += '<div style="font-size:12px;color:#999999">&#127939; ' + w.name + '</div>';
      whtml += '<div style="display:flex;align-items:center;gap:10px">';
      whtml += '<div style="font-size:12px;color:#22c55e;font-family:Inter,sans-serif;font-weight:700;letter-spacing:1px">+' + w.calories + ' burned</div>';
      whtml += '<button onclick="removeWorkout(' + w.id + ')" style="background:none;color:#8a8a8a;font-size:14px;padding:0 2px">x</button>';
      whtml += '</div></div>';
    }
    wlog.innerHTML = whtml;
  }

  // Today's log — sort by entry time (order added)
  var sorted = entries.slice().sort(function(a,b) { return a.id - b.id; });
  var flog = document.getElementById('food-log');
  var emsg = document.getElementById('empty-msg');
  if (sorted.length === 0) { flog.innerHTML = ''; emsg.style.display = 'block'; return; }
  emsg.style.display = 'none';
  var fhtml = '<div class="card fadein" style="overflow:hidden;margin-bottom:16px">';
  fhtml += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #1e1e1e">';
  fhtml += '<div style="font-size:10px;letter-spacing:2px;color:#8a8a8a">TODAY\'S LOG</div>';
  fhtml += '<button onclick="resetToday()" style="background:none;color:#777777;font-size:11px;padding:2px 6px">reset</button></div>';
  for (var i=0; i<sorted.length; i++) {
    var e = sorted[i];
    var border = i < sorted.length-1 ? 'border-bottom:1px solid #1a1a1a;' : '';
    var t = new Date(e.id);
    var timeStr = t.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
    fhtml += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;' + border + 'background:#161616">';
    fhtml += '<div><div style="font-size:13px;color:#ccc">' + e.name + '</div>';
    fhtml += '<div style="font-size:10px;color:#8a8a8a;margin-top:1px">' + e.protein + 'g Protein · ' + timeStr + '</div></div>';
    fhtml += '<div style="display:flex;align-items:center;gap:12px">';
    fhtml += '<div style="font-size:15px;font-family:Inter,sans-serif;font-weight:700;color:#e8e8e8;letter-spacing:1px">' + e.calories + '</div>';
    fhtml += '<button onclick="removeFood(' + e.id + ')" style="background:none;color:#8a8a8a;font-size:16px;padding:0 4px">x</button>';
    fhtml += '</div></div>';
  }
  fhtml += '</div>';
  flog.innerHTML = fhtml;
}

function isValidDateKey(k) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(k)) return false;
  var d = new Date(k + 'T12:00:00');
  return !isNaN(d.getTime());
}

function getPastWeek() {
  var h = getHistory(); var today = todayKey(); var days = [];
  for (var k in h) { if (k !== today && isValidDateKey(k)) days.push(k); }
  days.sort(function(a,b) { return b > a ? 1 : -1; });
  if (days.length > 7) days = days.slice(0,7);
  return days.map(function(d) { return [d, h[d]]; });
}

function fmtDay(s) {
  var d = new Date(s + 'T12:00:00');
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}

function readdFood(name, cal, prot) { addFood(name, cal, prot); switchTab('today'); }

function renderHistory() {
  var past = getPastWeek();
  var wrap = document.getElementById('history-content');
  if (past.length === 0) { wrap.innerHTML = '<div style="text-align:center;color:#5a5a5a;font-size:12px;padding:48px 0;letter-spacing:1px">NO HISTORY YET</div>'; return; }
  var seen = {}; var unique = [];
  for (var i=0; i<past.length; i++) {
    var d = past[i][1];
    var items = Array.isArray(d) ? d : (d.entries || []);
    for (var j=0; j<items.length; j++) { if (!seen[items[j].name]) { seen[items[j].name]=true; unique.push(items[j]); } }
  }
  unique.sort(function(a,b) {
    var an = /^\d/.test(a.name); var bn = /^\d/.test(b.name);
    if (an && !bn) return -1; if (!an && bn) return 1;
    return a.name.toLowerCase() < b.name.toLowerCase() ? -1 : a.name.toLowerCase() > b.name.toLowerCase() ? 1 : 0;
  });
  var html = '<div style="margin-bottom:20px"><div style="font-size:10px;letter-spacing:2px;color:#8a8a8a;margin-bottom:10px">TAP TO RE-ADD</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
  for (var i=0; i<unique.length; i++) {
    var it = unique[i];
    var safeName = it.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    html += '<button onclick="readdFood(\'' + safeName + '\',' + it.calories + ',' + it.protein + ')" style="background:#161616;color:#aaa;font-size:11px;padding:7px 11px;border:1px solid #2a2a2a;border-radius:6px">+ ' + it.name + ' ' + it.calories + 'Cal</button>';
  }
  html += '</div></div>';
  for (var i=0; i<past.length; i++) {
    var dateStr = past[i][0]; var rawData = past[i][1];
    var dayItems = Array.isArray(rawData) ? rawData : (rawData.entries || []);
    var dayWorkouts = Array.isArray(rawData) ? [] : (rawData.workouts || []);
    // Sort day items: numbers first, then A-Z
    dayItems = dayItems.slice().sort(function(a,b) {
      var an = /^\d/.test(a.name);
      var bn = /^\d/.test(b.name);
      if (an && !bn) return -1;
      if (!an && bn) return 1;
      return a.name.toLowerCase() < b.name.toLowerCase() ? -1 : a.name.toLowerCase() > b.name.toLowerCase() ? 1 : 0;
    });
    var dayCal = 0; for (var k=0; k<dayItems.length; k++) dayCal += dayItems[k].calories;
    var dayProt = 0; for (var k=0; k<dayItems.length; k++) dayProt += dayItems[k].protein;
    var dayBurned = 0; for (var k=0; k<dayWorkouts.length; k++) dayBurned += dayWorkouts[k].calories;
    var dayGoal = BASE_GOAL + dayBurned;
    var isOpen = expandedDay === dateStr;
    var calColor = dayCal > dayGoal ? '#ef4444' : '#22c55e';
    var workoutNote = dayWorkouts.length ? ' · ' + dayWorkouts.length + ' workout' : '';
    html += '<div class="card" style="overflow:hidden;margin-bottom:10px">';
    html += '<button onclick="toggleDay(\'' + dateStr + '\')" style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:none;color:#e8e8e8;text-align:left">';
    html += '<div><div style="font-size:12px;color:#aaa">' + fmtDay(dateStr) + '</div>';
    html += '<div style="font-size:11px;color:#8a8a8a;margin-top:2px">' + dayItems.length + ' items' + workoutNote + '</div></div>';
    html += '<div style="text-align:right"><div style="font-size:16px;font-family:Inter,sans-serif;font-weight:700;color:' + calColor + ';letter-spacing:1px">' + dayCal + ' Cal</div>';
    html += '<div style="font-size:11px;color:#8a8a8a">' + dayProt + 'g Protein' + (dayBurned ? ' · ' + dayBurned + ' burned' : '') + '</div></div></button>';
    if (isOpen) {
      for (var k=0; k<dayWorkouts.length; k++) {
        var w = dayWorkouts[k];
        html += '<div style="display:flex;justify-content:space-between;padding:8px 16px;border-top:1px solid #1a1a1a;background:#0d1a0d">';
        html += '<div style="font-size:12px;color:#4a7a4a">&#127939; ' + w.name + '</div>';
        html += '<div style="font-size:12px;color:#22c55e;font-family:Inter,sans-serif;font-weight:700;letter-spacing:1px">+' + w.calories + ' burned</div></div>';
      }
      for (var k=0; k<dayItems.length; k++) {
        var it = dayItems[k];
        var safeName = it.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        var tStr = it.id ? new Date(it.id).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}) : '';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-top:1px solid #1a1a1a;background:#131313">';
        html += '<div><div style="font-size:12px;color:#888">' + it.name + '</div>';
        html += '<div style="font-size:10px;color:#777777">' + it.protein + 'g Protein' + (tStr ? ' · ' + tStr : '') + '</div></div>';
        html += '<div style="display:flex;align-items:center;gap:10px">';
        html += '<div style="font-size:13px;font-family:Inter,sans-serif;font-weight:700;color:#999999;letter-spacing:1px">' + it.calories + '</div>';

        html += '</div></div>';
      }
    }
    html += '</div>';
  }
  wrap.innerHTML = html;
}

function getPersonalDB() { try { return JSON.parse(storeGet('fuel_fooddb') || '[]'); } catch(e) { return []; } }
function savePersonalDB(db) { storeSet('fuel_fooddb', JSON.stringify(db)); }

function addToPersonalDB(name, cal, prot) {
  if (!name) return;
  var db = getPersonalDB();
  var key = name.trim().toLowerCase();
  for (var i=0; i<db.length; i++) {
    if (db[i].name.trim().toLowerCase() === key) {
      db[i].calories = Number(cal); db[i].protein = Number(prot) || 0;
      db[i].count = (db[i].count || 1) + 1;
      savePersonalDB(db); return;
    }
  }
  db.push({ name: name.trim(), calories: Number(cal), protein: Number(prot) || 0, count: 1 });
  savePersonalDB(db);
}

function deleteFromPersonalDB(name) {
  var db = getPersonalDB();
  var key = name.trim().toLowerCase();
  var out = [];
  for (var i=0; i<db.length; i++) { if (db[i].name.trim().toLowerCase() !== key) out.push(db[i]); }
  savePersonalDB(out);
}

var acTimer = null;
var acOFFResults = [];

function onFoodNameInput() {
  var q = document.getElementById('inp-name').value.trim();
  if (acTimer) clearTimeout(acTimer);
  if (q.length < 1) { hideAutocomplete(); return; }
  renderAutocomplete(q);
  // Debounced Open Food Facts network search
  acTimer = setTimeout(function() { searchOpenFoodFacts(q); }, 350);
}

function localMatches(q) {
  var ql = q.toLowerCase();
  var results = [];
  // Personal DB first (sorted by frequency)
  var db = getPersonalDB().slice().sort(function(a,b){ return (b.count||0)-(a.count||0); });
  for (var i=0; i<db.length; i++) {
    if (db[i].name.toLowerCase().indexOf(ql) !== -1) results.push({name:db[i].name, calories:db[i].calories, protein:db[i].protein, src:'mine'});
  }
  // Seed foods
  for (var j=0; j<SEED_FOODS.length; j++) {
    var f = SEED_FOODS[j];
    if (f[0].toLowerCase().indexOf(ql) !== -1) {
      // skip if already in personal results by same name
      var dup = false;
      for (var k=0; k<results.length; k++){ if (results[k].name.toLowerCase()===f[0].toLowerCase()){dup=true;break;} }
      if (!dup) results.push({name:f[0], calories:f[1], protein:f[2], src:'db'});
    }
  }
  return results;
}

function renderAutocomplete(q) {
  var local = localMatches(q);
  var all = local.concat(acOFFResults);
  // De-dupe by name
  var seen = {}; var deduped = [];
  for (var i=0;i<all.length;i++){ var nk=all[i].name.toLowerCase(); if(!seen[nk]){seen[nk]=1;deduped.push(all[i]);} }
  deduped = deduped.slice(0, 30);
  var box = document.getElementById('autocomplete-list');
  if (deduped.length === 0) { hideAutocomplete(); return; }
  var html = '';
  for (var m=0; m<deduped.length; m++) {
    var it = deduped[m];
    var safe = it.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var srcColor = it.src==='mine' ? 'background:#1a1a2e;color:#60a5fa' : (it.src==='db' ? 'background:#1a2a1a;color:#22c55e' : 'background:#2a2a1a;color:#eab308');
    var srcLabel = it.src==='mine' ? 'MINE' : (it.src==='db' ? 'DB' : 'OFF');
    html += '<div class="ac-item" onclick="pickAutocomplete(\'' + safe + '\',' + it.calories + ',' + it.protein + ')">';
    html += '<span class="ac-name">' + it.name + '</span>';
    html += '<span class="ac-macro">' + it.calories + ' Cal · ' + it.protein + 'g</span>';
    html += '<span class="ac-src" style="' + srcColor + '">' + srcLabel + '</span>';
    html += '</div>';
  }
  box.innerHTML = html;
  box.style.display = 'block';
}

function pickAutocomplete(name, cal, prot) {
  document.getElementById('inp-name').value = name;
  document.getElementById('inp-cal').value = cal;
  document.getElementById('inp-prot').value = prot;
  hideAutocomplete();
  acOFFResults = [];
}

function hideAutocomplete() {
  var box = document.getElementById('autocomplete-list');
  if (box) box.style.display = 'none';
}

function searchOpenFoodFacts(q) {
  var url = 'https://world.openfoodfacts.org/cgi/search.pl?search_terms=' + encodeURIComponent(q) + '&search_simple=1&action=process&json=1&page_size=12&fields=product_name,nutriments';
  fetch(url).then(function(r){ return r.json(); }).then(function(data){
    var prods = data.products || [];
    var out = [];
    for (var i=0;i<prods.length;i++){
      var p = prods[i];
      var nm = p.product_name;
      if (!nm) continue;
      var n = p.nutriments || {};
      var cal = n['energy-kcal_serving'] || n['energy-kcal_100g'];
      var prot = n['proteins_serving'] || n['proteins_100g'];
      if (cal == null) continue;
      out.push({ name: nm.trim(), calories: Math.round(cal), protein: Math.round((prot||0)*10)/10, src:'off' });
    }
    acOFFResults = out;
    // Only re-render if the query still matches what's typed
    var cur = document.getElementById('inp-name').value.trim();
    if (cur === q) renderAutocomplete(q);
  }).catch(function(){ /* offline or blocked - silently ignore, local still works */ });
}

var pendingServing = null;

function openServingModal(name, cal, prot) {
  pendingServing = { name: name, calories: Number(cal), protein: Number(prot) || 0 };
  document.getElementById('serving-food-name').textContent = name;
  document.getElementById('serving-per-info').textContent = cal + ' Cal · ' + prot + 'g Protein per serving';
  document.getElementById('serving-count').value = '1';
  updateServingTotal();
  document.getElementById('serving-modal').classList.add('active');
}

function closeServingModal() {
  document.getElementById('serving-modal').classList.remove('active');
  pendingServing = null;
}

function changeServing(delta) {
  var inp = document.getElementById('serving-count');
  var val = parseFloat(inp.value) || 1;
  val = Math.max(0.25, Math.round((val + delta) * 4) / 4);
  inp.value = val;
  updateServingTotal();
}

function updateServingTotal() {
  if (!pendingServing) return;
  var s = parseFloat(document.getElementById('serving-count').value) || 1;
  var totalCal = Math.round(pendingServing.calories * s);
  var totalProt = Math.round(pendingServing.protein * s * 10) / 10;
  document.getElementById('serving-total').textContent = totalCal + ' Cal · ' + totalProt + 'g Protein total';
}

function confirmServing() {
  if (!pendingServing) return;
  var s = parseFloat(document.getElementById('serving-count').value) || 1;
  var totalCal = Math.round(pendingServing.calories * s);
  var totalProt = Math.round(pendingServing.protein * s * 10) / 10;
  var label = s === 1 ? pendingServing.name : pendingServing.name + ' ×' + s;
  addToPersonalDB(pendingServing.name, pendingServing.calories, pendingServing.protein);
  addFood(label, totalCal, totalProt);
  closeServingModal();
}

    </div>
    <div id="serving-total" style="font-size:12px;color:#8a8a8a;text-align:center;margin-bottom:16px;letter-spacing:1px"></div>
    <button onclick="confirmServing()" style="width:100%;background:#e8e8e8;color:#0f0f0f;padding:11px;font-size:12px;font-weight:500;letter-spacing:1px;border-radius:6px;border:none;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px">+ ADD TO LOG</button>
    <button onclick="closeServingModal()" style="width:100%;background:none;color:#8a8a8a;padding:8px;font-size:11px;border:1px solid #2a2a2a;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif">CANCEL</button>
  </div>
</div>

<!-- Hidden DB manager trigger -->
<div id="db-dot" onclick="openDBManager()" title="Food database"></div>

<!-- Personal Food DB Manager -->
<div id="db-modal">
  <div style="max-width:480px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div style="font-family:'Inter',sans-serif;font-weight:800;font-size:24px;letter-spacing:-0.5px;color:#fff">FOOD DATABASE</div>
      <button onclick="closeDBManager()" style="background:#1a1a1a;color:#aaa;font-size:13px;padding:8px 14px;border:1px solid #2a2a2a;border-radius:6px">CLOSE</button>
    </div>
    <div style="font-size:11px;color:#8a8a8a;margin-bottom:16px;letter-spacing:1px">Foods you log are saved here automatically. Delete any you don't want suggested.</div>
    <div id="db-list"></div>
  </div>
</div>
</body>
</html>
